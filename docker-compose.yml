version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - DATABASE_URL=file:./data/dev.db
      - PRODUCTS_DATA_SOURCE=database
    volumes:
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data:
