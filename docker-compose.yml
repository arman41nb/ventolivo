version: "3.8"

services:
  libretranslate:
    image: libretranslate/libretranslate
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - libretranslate-data:/home/libretranslate/.local
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - DATABASE_URL=file:./data/dev.db
      - PRODUCTS_DATA_SOURCE=database
      - MEDIA_STORAGE_DRIVER=local
      - MEDIA_LOCAL_UPLOAD_DIR=public/uploads/media
      - MEDIA_PUBLIC_BASE_PATH=/uploads/media
      - LIBRETRANSLATE_URL=http://libretranslate:5000
      - RATE_LIMIT_DRIVER=database
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_MEDIA_UPLOADS=10
      - RATE_LIMIT_MAX_TRANSLATION_REQUESTS=20
    volumes:
      - db-data:/app/data
      - media-data:/app/public/uploads/media
    restart: unless-stopped

volumes:
  db-data:
  media-data:
  libretranslate-data:
