name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ADMIN_SESSION_SECRET: 0123456789abcdef0123456789abcdef
      DATABASE_URL: file:./prisma/ci.db
      NEXT_PUBLIC_SITE_URL: https://ventolivo.example
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run ci:check
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20
    env:
      ADMIN_SESSION_SECRET: 0123456789abcdef0123456789abcdef
      DATABASE_URL: file:./prisma/ci.db
      NEXT_PUBLIC_SITE_URL: https://ventolivo.example
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: docker build -t ventolivo:${{ github.sha }} .

  smoke:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30
    env:
      ADMIN_PASSWORD: AdminPass123!
      ADMIN_SESSION_SECRET: 0123456789abcdef0123456789abcdef
      ADMIN_USERNAME: admin
      DATABASE_URL: file:./prisma/e2e.db
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3100
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
      PLAYWRIGHT_DATABASE_URL: file:./prisma/e2e.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
